name: CI

on:
    push:
        branches: [main]
    pull_request:

jobs:
    typescript:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v5
              with:
                  node-version: "24.16.0"
                  cache: npm
            - run: npm ci
            - run: npm run format:check
            - run: npm run typecheck
            - run: npm run lint
            - run: npm test
            - run: npm run build
